name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/remi-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/remi-worker:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  build-admin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push admin
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/remi-admin:${{ github.sha }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin

  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-worker, build-admin]
    steps:
      - uses: actions/checkout@v4

      - name: Ensure remote deploy directory exists
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/remi

      - name: Upload production compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /home/ec2-user/remi

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -eu

            compose() {
              if docker compose version >/dev/null 2>&1; then
                docker compose "$@"
              elif command -v docker-compose >/dev/null 2>&1; then
                docker-compose "$@"
              else
                echo "Neither 'docker compose' nor 'docker-compose' is installed on the server."
                exit 1
              fi
            }

            # Log in to GHCR using the repo owner's PAT (GHCR_PAT must belong to repository_owner)
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            cd ~/remi

            if [ ! -f docker-compose.prod.yml ]; then
              echo "docker-compose.prod.yml was not found in ~/remi after upload."
              exit 1
            fi

            if [ ! -f .env.prod ]; then
              echo ".env.prod was not found in ~/remi. Create it on the server before deploying."
              exit 1
            fi

            export GHCR_IMAGE_PREFIX="ghcr.io/${{ github.repository_owner }}"
            export IMAGE_TAG="${{ github.sha }}"

            # Persist the exact image set for manual EC2 compose commands.
            # This prevents the server from falling back to mutable `latest`.
            printf 'GHCR_IMAGE_PREFIX=%s\nIMAGE_TAG=%s\n' "$GHCR_IMAGE_PREFIX" "$IMAGE_TAG" > .env

            # Remove unused images to free disk space before pulling new ones
            docker image prune -af

            # Pull images pinned to this exact commit SHA
            compose -f docker-compose.prod.yml pull

            # Apply pending Prisma migrations.
            # If upgrading an existing database that was previously managed by db push,
            # run `pnpm --filter @remi/db exec prisma migrate resolve --applied 0_init`
            # once against that database before this workflow is allowed to deploy.
            compose -f docker-compose.prod.yml run --rm api \
              pnpm --filter @remi/db db:migrate:prod

            # Restart all services with new images
            compose -f docker-compose.prod.yml up -d --remove-orphans
