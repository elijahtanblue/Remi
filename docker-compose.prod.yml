# Production compose — images are pulled from GHCR.
#
# Compose-level variables (not container env vars):
#   GHCR_IMAGE_PREFIX — set via shell env or a .env file in this directory
#   IMAGE_TAG         — required. Use the commit SHA image tag built by GitHub Actions.
#
# On EC2, create ~/remi/.env with:
#   GHCR_IMAGE_PREFIX=ghcr.io/your-github-username
#   IMAGE_TAG=<github-commit-sha>
#
# In GitHub Actions, the deploy workflow exports both variables inline.
services:
  api:
    image: ${GHCR_IMAGE_PREFIX:?Set GHCR_IMAGE_PREFIX in ~/remi/.env}/remi-api:${IMAGE_TAG:?Set IMAGE_TAG in ~/remi/.env to a pushed commit SHA}
    ports:
      - "3000:3000"
    env_file: .env.prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  admin:
    image: ${GHCR_IMAGE_PREFIX:?Set GHCR_IMAGE_PREFIX in ~/remi/.env}/remi-admin:${IMAGE_TAG:?Set IMAGE_TAG in ~/remi/.env to a pushed commit SHA}
    ports:
      - "3001:3000"
    env_file: .env.prod
    environment:
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    image: ${GHCR_IMAGE_PREFIX:?Set GHCR_IMAGE_PREFIX in ~/remi/.env}/remi-worker:${IMAGE_TAG:?Set IMAGE_TAG in ~/remi/.env to a pushed commit SHA}
    env_file: .env.prod
    restart: unless-stopped
