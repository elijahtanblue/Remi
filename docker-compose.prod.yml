# Production compose — images are pulled from GHCR.
#
# Compose-level variables (not container env vars):
#   GHCR_IMAGE_PREFIX — set via shell env or a .env file in this directory
#   IMAGE_TAG         — defaults to "latest"; deploy workflow pins to ${{ github.sha }}
#
# On EC2, create ~/remi/.env with:
#   GHCR_IMAGE_PREFIX=ghcr.io/your-github-username
#
# In GitHub Actions, the deploy workflow exports both variables inline.
services:
  api:
    image: ${GHCR_IMAGE_PREFIX}/remi-api:${IMAGE_TAG:-latest}
    ports:
      - "3000:3000"
    env_file: .env.prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  admin:
    image: ${GHCR_IMAGE_PREFIX}/remi-admin:${IMAGE_TAG:-latest}
    ports:
      - "3001:3000"
    env_file: .env.prod
    environment:
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    image: ${GHCR_IMAGE_PREFIX}/remi-worker:${IMAGE_TAG:-latest}
    env_file: .env.prod
    restart: unless-stopped
