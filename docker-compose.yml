services:
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: remi
      POSTGRES_USER: remi
      POSTGRES_PASSWORD: remi_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
